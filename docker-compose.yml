version: "3.9"

# ============================================================
# UBPD — Sistema de Gestión de Formularios y Estadísticas
# Red Local (Air-Gapped) | Docker Compose
# ============================================================

services:

  # ──────────────────────────────────────────────
  # NGINX — Reverse Proxy (Punto de Entrada Único)
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ubpd_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────
  # FRONTEND — Vue.js (Build estático servido por Nginx)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: ubpd_frontend
    restart: unless-stopped
    networks:
      - ubpd_network
    # No expone puertos directamente — todo pasa por nginx

  # ──────────────────────────────────────────────
  # BACKEND — FastAPI (Python)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────
  # CELERY — Worker de Tareas Asíncronas (Pipelines)
  # ──────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - backend
      - redis
      - postgres
    networks:
      - ubpd_network

  # ──────────────────────────────────────────────
  # CELERY BEAT — Scheduler de Tareas Periódicas
  # ──────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery
      - redis
    networks:
      - ubpd_network

  # ──────────────────────────────────────────────
  # POSTGRESQL — Base de Datos Principal
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ubpd_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro  # Scripts de inicialización
    networks:
      - ubpd_network
    # Puerto NO expuesto al host en producción
    # ports:
    #   - "5432:5432"   # Descomentar solo para desarrollo/debug
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────
  # MINIO — Almacenamiento de Archivos (S3-compatible)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ubpd_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"  # Consola MinIO — solo desde el servidor (SSH tunnel si se necesita remotamente)
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────
  # REDIS — Caché y Broker de Celery
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ubpd_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ──────────────────────────────────────────────
# VOLÚMENES — Persistencia de Datos
# ──────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: ubpd_postgres_data
  minio_data:
    driver: local
    name: ubpd_minio_data
  redis_data:
    driver: local
    name: ubpd_redis_data

# ──────────────────────────────────────────────
# RED INTERNA
# ──────────────────────────────────────────────
networks:
  ubpd_network:
    driver: bridge
    name: ubpd_network
