# ============================================================
# UBPD — Sistema de Gestión de Formularios y Estadísticas
# Entorno único: intranet / producción
#
# Para activar opciones de desarrollo, descomentar las secciones
# marcadas con "# [DEV]" y reiniciar el servicio correspondiente.
#
# Gestión: ./scripts/prod.sh [start|stop|restart|logs|ps|shell|...]
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # NGINX — Reverse Proxy y punto de entrada único (HTTP)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ubpd_nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # FRONTEND — Vue.js (build estático servido por Nginx)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: ubpd_frontend
    restart: unless-stopped
    networks:
      - ubpd_network
    # No expone puertos — todo el tráfico pasa por nginx

  # ──────────────────────────────────────────────────────────
  # BACKEND — FastAPI (Python)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@valkey:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./logs/backend:/app/logs
      # [DEV] Montar código para hot-reload (descomentar + reiniciar):
      # - ./backend:/app
    networks:
      - ubpd_network
    # [DEV] Exponer API directamente para /api/docs sin pasar por nginx:
    # ports:
    #   - "8000:8000"
    #
    # [DEV] Activar hot-reload (descomentar junto con el volumen de código):
    # command: >
    #   uvicorn app.main:app
    #   --host 0.0.0.0 --port 8000
    #   --reload --log-level debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # CELERY — Worker de Tareas Asíncronas
  # ──────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@valkey:6379/0
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      - backend
      - valkey
      - postgres
    volumes:
      - ./logs/backend:/app/logs
      # [DEV] Montar código para ver cambios sin rebuild:
      # - ./backend:/app
    networks:
      - ubpd_network

  # ──────────────────────────────────────────────────────────
  # CELERY BEAT — Scheduler de Tareas Periódicas
  # ──────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ubpd_celery_beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@valkey:6379/0
    depends_on:
      - celery
      - valkey
    volumes:
      - ./logs/backend:/app/logs
      # [DEV] Montar código para ver cambios sin rebuild:
      # - ./backend:/app
    networks:
      - ubpd_network

  # ──────────────────────────────────────────────────────────
  # POSTGRESQL — Base de Datos
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ubpd_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - ubpd_network
    # [DEV] Exponer para TablePlus / DBeaver / psql local:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # MINIO — Almacenamiento de Archivos (S3-compatible)
  # ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ubpd_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # Consola MinIO — accesible solo desde el servidor (SSH tunnel para acceso remoto)
      - "127.0.0.1:9001:9001"
      # [DEV] API MinIO accesible directamente desde el host:
      # - "9000:9000"
    networks:
      - ubpd_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # VALKEY — Broker de Celery y Caché (fork open-source de Redis)
  # ──────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:7-alpine
    container_name: ubpd_valkey
    restart: unless-stopped
    command: valkey-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - valkey_data:/data
    networks:
      - ubpd_network
    # [DEV] Exponer para valkey-cli / RedisInsight local:
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# ──────────────────────────────────────────────────────────
# VOLÚMENES — Persistencia de Datos
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
    name: ubpd_postgres_data
  minio_data:
    driver: local
    name: ubpd_minio_data
  valkey_data:
    driver: local
    name: ubpd_valkey_data

# ──────────────────────────────────────────────────────────
# RED INTERNA
# ──────────────────────────────────────────────────────────
networks:
  ubpd_network:
    driver: bridge
    name: ubpd_network
