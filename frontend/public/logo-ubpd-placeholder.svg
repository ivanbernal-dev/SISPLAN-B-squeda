<svg xmlns="http://www.w3.org/2000/svg" width="120" height="40" viewBox="0 0 120 40" role="img" aria-label="UBPD — Unidad de Búsqueda de Personas dadas por Desaparecidas">
  <title>UBPD — Unidad de Búsqueda</title>

  <!-- Fondo redondeado sutil -->
  <rect width="120" height="40" rx="4" fill="none"/>

  <!-- Bloque de color lila (identificador visual) -->
  <rect x="0" y="8" width="4" height="24" rx="2" fill="#A97CC9"/>

  <!-- Texto UBPD -->
  <text
    x="12"
    y="27"
    font-family="Montserrat, sans-serif"
    font-weight="700"
    font-size="20"
    fill="#A97CC9"
    letter-spacing="1"
  >UBPD</text>

  <!-- Línea separadora -->
  <line x1="75" y1="10" x2="75" y2="30" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Subtexto -->
  <text
    x="82"
    y="18"
    font-family="Barlow, sans-serif"
    font-weight="500"
    font-size="6"
    fill="#323232"
    opacity="0.7"
  >Unidad de</text>
  <text
    x="82"
    y="26"
    font-family="Barlow, sans-serif"
    font-weight="500"
    font-size="6"
    fill="#323232"
    opacity="0.7"
  >Búsqueda</text>
</svg>
