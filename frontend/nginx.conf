# ============================================================
# UBPD Frontend — Nginx para servir SPA Vue.js (interno)
# ============================================================

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Vue Router en modo history: todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash de Vite
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Sin cache para index.html (siempre fresco)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
