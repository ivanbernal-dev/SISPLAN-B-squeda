# alembic.ini — Configuración de Alembic para UBPD Backend
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Ruta al directorio de scripts de migración
script_location = alembic

# Plantilla para nombres de archivos de migración
# file_template = %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Codificación del sistema de archivos para los archivos .py de migración
prepend_sys_path = .

# Versión de sintaxis para los archivos generados
version_path_separator = os

# Nivel de log para Alembic (se puede sobreescribir en la línea de comandos)
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
